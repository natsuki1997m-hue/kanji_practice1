<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genki 1 — Flashcards & Stroke Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDMincho:wght@400&family=Noto+Sans+JP:wght@400;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--serif:'BIZ UDMincho','Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;--ui:'Nunito','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ui);background:#f8f9ff;min-height:100vh;display:flex;flex-direction:column;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8f9ff;padding:24px;}
.login-card{background:#fff;border-radius:24px;border:2px solid #eee;padding:40px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;}
.login-logo{font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:36px;color:#222;}
.login-logo span{color:#FF6B35;}
.login-title{font-size:16px;color:#555;font-weight:700;}
.login-input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid #eee;font-family:var(--ui);font-size:16px;outline:none;text-align:center;}
.login-input:focus{border-color:#FF6B35;}
.login-btn{width:100%;padding:14px;border-radius:14px;border:none;background:#FF6B35;color:#fff;font-family:var(--ui);font-weight:800;font-size:16px;cursor:pointer;}
.login-btn:hover{background:#e55a1f;}
.login-teacher{font-size:12px;color:#aaa;cursor:pointer;text-decoration:underline;margin-top:4px;}
.dash-wrap{max-width:900px;margin:0 auto;padding:24px 16px;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.dash-title{font-size:22px;font-weight:900;color:#222;}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.student-card{background:#fff;border-radius:16px;border:2px solid #eee;padding:16px;cursor:pointer;transition:all .15s;}
.student-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
.student-name{font-size:16px;font-weight:800;color:#222;margin-bottom:6px;}
.student-stats{font-size:12px;color:#888;}
.student-prog{height:6px;background:#eee;border-radius:99px;margin-top:8px;overflow:hidden;}
.student-prog-fill{height:100%;background:#FF6B35;border-radius:99px;}
.weak-section{margin-top:32px;}
.weak-title{font-size:16px;font-weight:800;margin-bottom:12px;}
.weak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.weak-item{background:#fff7f5;border:1.5px solid #FF6B35;border-radius:12px;padding:10px 12px;}
.weak-kanji{font-family:var(--serif);font-size:20px;color:#FF6B35;}
.weak-read{font-size:11px;color:#888;margin-top:2px;}

/* NAV */
.nav{display:flex;align-items:center;background:#fff;border-bottom:3px solid #eee;padding:0 16px;overflow-x:auto;flex-shrink:0;position:sticky;top:0;z-index:100;gap:0;}
.nav-logo{font-family:var(--serif);font-weight:900;font-size:20px;color:#222;padding:12px 14px 12px 0;border-right:2px solid #eee;margin-right:10px;white-space:nowrap;letter-spacing:-.5px;}
.nav-logo span{color:#FF6B35;}
.nav-modes{display:flex;gap:4px;padding:8px 0;border-right:2px solid #eee;margin-right:10px;padding-right:10px;}
.nmode{padding:7px 16px;border-radius:20px;border:2px solid #ddd;background:#fff;font-family:var(--ui);font-weight:800;font-size:13px;cursor:pointer;color:#666;transition:all .2s;white-space:nowrap;}
.nmode.active{background:#222;color:#fff;border-color:#222;}
.lesson-tabs{display:flex;gap:5px;padding:8px 0;}
.l-tab{padding:6px 14px;border-radius:20px;border:2px solid #ddd;background:#fff;font-family:var(--ui);font-weight:800;font-size:13px;cursor:pointer;color:#666;transition:all .2s;white-space:nowrap;}
.l-tab.active{color:#fff;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 16px;gap:18px;}

/* PROGRESS */
.prog-wrap{width:100%;max-width:520px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:10px;background:#e8e8e8;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .4s;}
.prog-text{font-size:13px;font-weight:700;color:#888;white-space:nowrap;}
.got-badge{font-size:12px;font-weight:800;padding:3px 10px;border-radius:99px;white-space:nowrap;}

/* CARD */
.card-area{width:100%;max-width:520px;}
.card-wrap{width:100%;height:270px;perspective:1200px;cursor:pointer;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.card-wrap.flipped .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:8px;}
.card-front{background:#fff;border:3px solid #eee;}
.card-back{transform:rotateY(180deg);}
.card-kanji{font-family:var(--serif);font-size:92px;line-height:1;font-weight:400;}
.card-hint{font-size:13px;color:#bbb;font-weight:700;margin-top:4px;}
.card-reading{font-family:var(--serif);font-size:28px;font-weight:700;}
.card-meaning{font-family:var(--ui);font-size:16px;font-weight:700;opacity:.9;}
.red-pip{width:10px;height:10px;border-radius:50%;position:absolute;top:16px;right:16px;}

/* BUTTONS */
.btn-row{display:flex;gap:10px;width:100%;max-width:520px;justify-content:center;}
.btn{padding:12px 24px;border-radius:14px;border:2px solid #ddd;background:#fff;font-family:var(--ui);font-weight:800;font-size:14px;cursor:pointer;color:#333;transition:all .15s;min-width:80px;}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-dark{background:#222;color:#fff;border-color:#222;}
.btn-got{background:#2ECC71;color:#fff;border-color:#2ECC71;}
.btn-again{background:#FF6B35;color:#fff;border-color:#FF6B35;}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px;}

/* RESULT */
.result-card{width:100%;max-width:520px;background:#fff;border-radius:20px;border:3px solid #eee;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;}
.result-pct{font-size:64px;font-weight:900;line-height:1;}
.result-sub{font-size:15px;color:#888;font-weight:700;}
.result-row{display:flex;gap:32px;}
.rb{display:flex;flex-direction:column;align-items:center;gap:4px;}
.rb-n{font-size:28px;font-weight:900;}
.rb-l{font-size:12px;color:#aaa;font-weight:700;}

/* EMPTY */
.empty{text-align:center;padding:48px;color:#aaa;font-weight:700;font-size:15px;}

/* SETTINGS */
.settings-wrap{width:100%;max-width:720px;}
.settings-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.order-row{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:#555;}
.order-row select{padding:6px 10px;border-radius:10px;border:2px solid #ddd;font-family:var(--ui);font-weight:700;font-size:13px;}
.lesson-section{margin-bottom:24px;}
.lesson-sec-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.lesson-sec-title{font-size:14px;font-weight:900;}
.got-pill{font-size:11px;font-weight:800;padding:2px 10px;border-radius:99px;}
.sel-all-btn{font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px;border:2px solid;background:transparent;cursor:pointer;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;}
.wi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;border:2px solid #eee;background:#fff;cursor:pointer;transition:all .15s;}
.wi input{width:15px;height:15px;flex-shrink:0;cursor:pointer;}
.wi-kanji{font-family:var(--serif);font-size:18px;font-weight:700;}
.wi-read{font-size:11px;color:#888;font-weight:700;}
.red-dot-s{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;}

/* MIX */
.mix-card{width:100%;max-width:520px;background:#fff;border-radius:20px;border:3px solid #eee;padding:28px 24px;display:flex;flex-direction:column;gap:20px;}
.mix-title{font-size:20px;font-weight:900;}
.mix-label{font-size:13px;font-weight:700;color:#666;margin-bottom:8px;}
.lesson-picks{display:flex;gap:8px;flex-wrap:wrap;}
.lp{padding:8px 18px;border-radius:99px;border:2px solid #ddd;font-family:var(--ui);font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;background:#fff;color:#666;}
.lp.on{color:#fff;}
.count-row{display:flex;align-items:center;gap:14px;}
.count-row input[type=range]{flex:1;accent-color:#222;height:6px;}
.count-num{font-size:22px;font-weight:900;min-width:40px;text-align:center;}
.avail-note{font-size:12px;color:#aaa;font-weight:700;}

/* STROKE */
.stroke-page{width:100%;max-width:1100px;}
.kanji-grid-small{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.k-mini{background:#fff;border-radius:14px;border:2px solid #eee;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;}
.k-mini:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
.k-mini-char{font-family:var(--serif);font-size:38px;line-height:1;font-weight:400;}
.k-mini-read{font-size:9px;font-weight:700;text-align:center;width:100%;word-break:break-word;line-height:1.4;white-space:normal;}
.k-mini-meaning{font-size:10px;color:#aaa;}
.lesson-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:16px 20px;border-radius:16px;color:#fff;}
.lesson-header h1{font-family:var(--serif);font-size:22px;font-weight:900;}
.lesson-header p{font-size:13px;opacity:.85;margin-top:2px;}
.kanji-count{margin-left:auto;font-family:var(--serif);font-size:32px;font-weight:400;opacity:.7;}
.kanji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.kanji-card{background:#fff;border-radius:18px;border:2px solid #eee;padding:18px;display:flex;flex-direction:column;gap:12px;}
.kanji-card-top{display:flex;align-items:center;gap:14px;}
.kanji-big{font-family:var(--serif);font-size:68px;font-weight:400;line-height:1;min-width:76px;text-align:center;}
.kanji-reading{font-family:var(--sans);font-size:12px;font-weight:700;padding:2px 10px;border-radius:99px;display:inline-block;margin-bottom:4px;}
.kanji-meaning{font-family:var(--ui);font-size:13px;color:#555;font-weight:700;}
.stroke-count{font-family:var(--ui);font-size:11px;color:#aaa;font-weight:700;margin-top:2px;}
.stroke-sec-title{font-family:var(--ui);font-size:10px;font-weight:900;color:#aaa;letter-spacing:.08em;text-transform:uppercase;}
.anim-wrap{display:flex;align-items:center;gap:12px;}
.anim-box{width:100px;height:100px;border-radius:12px;border:2px solid #eee;display:flex;align-items:center;justify-content:center;background:#fafafa;flex-shrink:0;}
.anim-controls{display:flex;flex-direction:column;gap:6px;}
.anim-btn{padding:6px 14px;border-radius:10px;border:2px solid #ddd;font-family:var(--ui);font-weight:800;font-size:12px;cursor:pointer;background:#fff;color:#333;transition:all .15s;white-space:nowrap;}
.anim-btn:hover{transform:translateY(-1px);}
.stroke-prog{font-family:var(--ui);font-size:11px;color:#aaa;font-weight:700;}
.static-row{display:flex;gap:5px;flex-wrap:wrap;}
.static-step{display:flex;flex-direction:column;align-items:center;gap:2px;}
.static-box{width:46px;height:46px;border-radius:8px;border:1.5px solid #eee;background:#fafafa;display:flex;align-items:center;justify-content:center;}
.loading{font-family:var(--ui);color:#bbb;font-size:12px;font-weight:700;text-align:center;padding:16px;}
.step-num{font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--ui);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loginScreen"></div>
<div id="appScreen" style="display:none;flex-direction:column;min-height:100vh;">
<nav class="nav">
  <div class="nav-logo" style="font-family:'Noto Sans JP',sans-serif;font-weight:900;letter-spacing:.02em;">げんき <span>1</span></div>
  <div class="nav-modes">
    <button class="nmode active" onclick="setMode('practice',this)">Flashcards</button>
    <button class="nmode" onclick="setMode('stroke',this)">Stroke Order</button>
    <button class="nmode" onclick="setMode('mix',this)">Mixed Quiz</button>
    <button class="nmode" onclick="setMode('settings',this)">Settings</button>
  </div>
  <div class="lesson-tabs" id="lessonTabs"></div>
</nav>
<div class="main" id="mainArea"></div>

<script>
// ── Supabase ──────────────────────────────────────────────
const SUPA_URL='https://ozxlahysxpvxtzznzdoj.supabase.co';
const SUPA_KEY='sb_publishable_wWMYDN0zawBXuAGi8AQyeg_9M-QQySW';
const supa=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentStudent=null; // {id, name}
let isTeacher=false;

async function login(name){
  // Get or create student
  let {data,error}=await supa.from('students').select('*').eq('name',name).single();
  if(error||!data){
    const res=await supa.from('students').insert({name}).select().single();
    data=res.data;
  }
  if(!data){alert('ログインに失敗しました');return;}
  currentStudent=data;
  // Load saved progress into mas object
  await loadProgress();
  showApp();
}

async function loadProgress(){
  if(!currentStudent)return;
  const {data}=await supa.from('progress').select('*').eq('student_id',currentStudent.id);
  if(!data)return;
  // Reset mastered state
  Object.keys(mas).forEach(k=>mas[k]=false);
  learningWords.clear();
  data.forEach(row=>{
    Object.keys(FLASH).forEach(l=>{
      FLASH[l].forEach((w,i)=>{
        if(w.k===row.word&&w.r===row.reading){
          if(row.status==='got') mas[l+'-'+i]=true;
          if(row.status==='learning') learningWords.add(l+'-'+i);
        }
      });
    });
  });
}

// Track words marked as 'learning' this session (cannot be overwritten by 'got')
const learningWords=new Set();

async function saveProgress(lesson,wordIdx,status){
  if(!currentStudent)return;
  const w=FLASH[lesson][wordIdx];
  const key=lesson+'-'+wordIdx;
  if(status==='got'&&learningWords.has(key)){
    // Already marked as 'learning' - cannot overwrite with 'got'
    return;
  }
  if(status==='learning'){
    learningWords.add(key);
  }
  await supa.from('progress').upsert({
    student_id:currentStudent.id,
    lesson:parseInt(lesson),
    word:w.k,
    reading:w.r,
    status:status,
    updated_at:new Date().toISOString()
  },{onConflict:'student_id,word'});
}

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  // Add user name to nav
  const nav=document.querySelector('.nav');
  if(nav&&!document.getElementById('userBadge')){
    const badge=document.createElement('div');
    badge.id='userBadge';
    badge.style.cssText='margin-left:auto;padding:6px 14px;background:#f0f0f0;border-radius:99px;font-size:12px;font-weight:700;color:#555;white-space:nowrap;display:flex;align-items:center;gap:8px;';
    badge.innerHTML=currentStudent.name+' <button onclick="logout()" style="border:none;background:transparent;font-size:11px;color:#aaa;cursor:pointer;">logout</button>';
    nav.appendChild(badge);
  }
  buildTabs();P.deck=deck(cur);render();
}

function logout(){
  currentStudent=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='block';
  renderLogin();
}

function renderLogin(){
  document.getElementById('loginScreen').innerHTML=`
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo">げんき <span>1</span></div>
        <div class="login-title">名前を入力してください</div>
        <input class="login-input" id="nameInput" type="text" placeholder="例：田中たろう" maxlength="30"
          onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="login-btn" onclick="doLogin()">Start →</button>
        <div class="login-teacher" onclick="teacherLogin()">先生はこちら</div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('nameInput')?.focus(),100);
}

function doLogin(){
  const name=document.getElementById('nameInput')?.value?.trim();
  if(!name){alert('名前を入力してください');return;}
  login(name);
}

function teacherLogin(){
  const pw=prompt('パスワードを入力してください:');
  if(pw==='genki1teacher'){
    isTeacher=true;
    showTeacherDash();
  } else {
    alert('パスワードが違います');
  }
}

async function showTeacherDash(){
  document.getElementById('loginScreen').innerHTML='<div style="padding:24px;text-align:center;color:#aaa;">Loading...</div>';
  // Load all students
  const {data:students}=await supa.from('students').select('*').order('created_at');
  // Load all progress
  const {data:allProgress}=await supa.from('progress').select('*');

  const progByStudent={};
  (allProgress||[]).forEach(p=>{
    if(!progByStudent[p.student_id])progByStudent[p.student_id]={};
    progByStudent[p.student_id][p.word]={status:p.status,reading:p.reading,lesson:p.lesson};
  });

  const totalWords=Object.values(FLASH).reduce((s,w)=>s+w.length,0);

  let cards=(students||[]).map(s=>{
    const prog=progByStudent[s.id]||{};
    const got=Object.values(prog).filter(p=>p.status==='got').length;
    const learning=Object.values(prog).filter(p=>p.status==='learning'||p.status!=='got').length;
    const pct=totalWords>0?Math.round(got/totalWords*100):0;
    return `<div class="student-card" onclick="showStudentDetail('${s.id}','${s.name}')">
      <div class="student-name">${s.name}</div>
      <div class="student-stats">Got it: ${got} / ${totalWords} (${pct}%)</div>
      <div class="student-prog"><div class="student-prog-fill" style="width:${pct}%;"></div></div>
    </div>`;
  }).join('');

  document.getElementById('loginScreen').innerHTML=`
    <div class="dash-wrap">
      <div class="dash-header">
        <div class="dash-title">👩‍🏫 Teacher Dashboard</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" onclick="exportAllPDF()">📄 Export all PDF</button>
          <button class="btn btn-sm" onclick="renderLogin()">← Back</button>
        </div>
      </div>
      <div style="font-size:13px;color:#888;margin-bottom:16px;">${(students||[]).length} students</div>
      <div class="student-grid">${cards}</div>
    </div>`;
}

async function showStudentDetail(studentId,studentName){
  const {data:prog}=await supa.from('progress').select('*').eq('student_id',studentId);
  const weak=(prog||[]).filter(p=>p.status!=='got');
  const got=(prog||[]).filter(p=>p.status==='got').length;
  const total=Object.values(FLASH).reduce((s,w)=>s+w.length,0);

  const weakCards=weak.map(p=>`
    <div class="weak-item">
      <div class="weak-kanji">${p.word}</div>
      <div class="weak-read">${p.reading}</div>
    </div>`).join('');

  document.getElementById('loginScreen').innerHTML=`
    <div class="dash-wrap">
      <div class="dash-header">
        <div class="dash-title">${studentName}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" onclick="exportStudentPDF('${studentName}','${studentId}')">📄 PDF出力</button>
          <button class="btn btn-sm" onclick="showTeacherDash()">← Back</button>
        </div>
      </div>
      <div style="font-size:14px;color:#888;margin-bottom:20px;">
        Got it: ${got} / ${total} (${Math.round(got/total*100)}%)
      </div>
      ${weak.length>0?`
      <div class="weak-section">
        <div class="weak-title">⚠️ Still learning (${weak.length} words)</div>
        <div class="weak-grid">${weakCards}</div>
      </div>`:(prog&&prog.length>0?'<div style="color:#2ECC71;font-size:16px;font-weight:800;">🎉 All words mastered!</div>':'<div style="color:#aaa;font-size:14px;">まだデータがありません</div>')}
    </div>`;
}

function exportStudentPDF(name,studentId){
  supa.from('progress').select('*').eq('student_id',studentId).then(({data})=>{
    const weak=(data||[]).filter(p=>p.status!=='got');
    printWeakWords(name,weak);
  });
}

function exportAllPDF(){
  supa.from('students').select('*').then(async({data:students})=>{
    const {data:allProg}=await supa.from('progress').select('*');
    const lines=[];
    (students||[]).forEach(s=>{
      const weak=(allProg||[]).filter(p=>p.student_id===s.id&&p.status!=='got');
      if(weak.length>0){
        lines.push(`<h3 style="color:#FF6B35;margin:16px 0 8px;">${s.name} (${weak.length} words)</h3>`);
        lines.push(weak.map(p=>`<span style="display:inline-block;margin:4px;padding:6px 12px;border:1px solid #FF6B35;border-radius:8px;font-size:14px;">${p.word} (${p.reading})</span>`).join(''));
      }
    });
    const w=window.open('','_blank');
    w.document.write(`<html><body style="font-family:sans-serif;padding:24px;">
      <h1 style="color:#222;">げんき1 — Still Learning Words</h1>
      ${lines.join('')}
      <script>window.print();<\/script>

function getPathPoints(d){
  const mS=d.match(/^[Mm]\s*([\-\d.]+)[,\s]+([\-\d.]+)/);
  if(!mS)return null;
  const sx=parseFloat(mS[1]),sy=parseFloat(mS[2]);
  const coords=[];
  const re2=/([\-\d.]+)[,\s]+([\-\d.]+)/g;
  let m2;
  while((m2=re2.exec(d))!==null) coords.push([parseFloat(m2[1]),parseFloat(m2[2])]);
  if(!coords.length)return null;
  const ex=coords[coords.length-1][0],ey=coords[coords.length-1][1];
  const dx=coords.length>=2?coords[coords.length-2][0]:sx;
  const dy=coords.length>=2?coords[coords.length-2][1]:sy;
  return {sx,sy,ex,ey,dx,dy};
}

function arrowHead(x1,y1,x2,y2,col,sz){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return '';
  const ux=dx/len,uy=dy/len,px=-uy,py=ux;
  const ax=x2-ux*sz,ay=y2-uy*sz;
  return `<polygon points="${x2},${y2} ${ax+px*sz*0.5},${ay+py*sz*0.5} ${ax-px*sz*0.5},${ay-py*sz*0.5}" fill="${col}"/>`;
}

// Small SVG for animation box
function mkSVG(strokes,step,sz,col,dcol,char){
  const DONE='#222',PREV='#ccc',GRAY='#ccc';
  let paths='',overlay='';
  strokes.forEach((d,i)=>{
    let c;
    if(step===-2) c=GRAY;
    else if(step===-1) c=DONE;
    else if(i<step) c=PREV;
    else if(i===step) c=DONE;
    else c='transparent';
    paths+=`<path d="${d}" fill="none" stroke="${c}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
  // Current stroke badge (animation)
  if(step>=0&&step<strokes.length){
    const pts=getPathPoints(strokes[step]);
    if(pts){
      const bx=Math.max(8,Math.min(101,pts.sx)),by=Math.max(8,Math.min(101,pts.sy-10));
      overlay+=`<circle cx="${bx}" cy="${by}" r="7" fill="#444"/>`;
      overlay+=`<text x="${bx}" y="${by+3.5}" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="sans-serif">${step+1}</text>`;
    }
  }
  // All badges on completion
  if(step===-1){
    strokes.forEach((d,i)=>{
      const pts=getPathPoints(d);
      if(pts){
        const bx=Math.max(8,Math.min(101,pts.sx)),by=Math.max(8,Math.min(101,pts.sy-10));
        overlay+=`<circle cx="${bx}" cy="${by}" r="7" fill="#444"/>`;
        overlay+=`<text x="${bx}" y="${by+3.5}" text-anchor="middle" font-size="8" fill="white" font-weight="bold" font-family="sans-serif">${i+1}</text>`;
      }
    });
  }
  return `<svg viewBox="0 0 109 109" width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">
    <line x1="54.5" y1="3" x2="54.5" y2="106" stroke="#d0ecf8" stroke-width="0.7" stroke-dasharray="3,3"/>
    <line x1="3" y1="54.5" x2="106" y2="54.5" stroke="#d0ecf8" stroke-width="0.7" stroke-dasharray="3,3"/>
    ${paths}${overlay}</svg>`;
}

function getPathLength(d){
  // Estimate path length for dash animation
  // Use a temporary SVG path element
  try{
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    svg.appendChild(path);
    document.body.appendChild(svg);
    const len=path.getTotalLength();
    document.body.removeChild(svg);
    return len;
  }catch(e){return 100;}
}

function drawStroke(id,strokeIdx,col,onDone){
  const s=anim[id];
  if(!s||strokeIdx>=s.strokes.length){if(onDone)onDone();return;}
  const d=s.strokes[strokeIdx];
  const g=document.getElementById('mstrokes-'+id);
  if(!g)return;

  // Add previous strokes as gray (already drawn)
  // Current stroke: animate with dashoffset
  const len=getPathLength(d)*1.5+20; // a bit extra to ensure full draw
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',col);
  path.setAttribute('stroke-width','4.5');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('stroke-dasharray',len);
  path.setAttribute('stroke-dashoffset',len);
  path.style.transition='stroke-dashoffset 0.5s ease-in-out';
  g.appendChild(path);

  // Trigger animation
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      path.setAttribute('stroke-dashoffset','0');
    });
  });

  // When done, change to dark color and call next
  setTimeout(()=>{
    path.setAttribute('stroke','#222');
    path.style.transition='none';
    path.setAttribute('stroke-dasharray','none');
    path.setAttribute('stroke-dashoffset','0');
    if(onDone)onDone();
  },600);
}

function mPlay(id){
  const s=anim[id];if(!s||s.playing)return;
  const btn=document.getElementById('mpb-'+id);
  const sp=document.getElementById('msp-'+id);
  const col=s.col;
  s.playing=true;
  btn.textContent='⏸';btn.style.opacity='0.6';

  function playNext(i){
    if(!s.playing){btn.textContent='▶ Play';btn.style.opacity='1';return;}
    if(i>=s.strokes.length){
      s.playing=false;s.step=s.strokes.length;
      btn.textContent='▶ Play';btn.style.opacity='1';
      sp.textContent=s.strokes.length+'/'+s.strokes.length;
      return;
    }
    sp.textContent=(i+1)+'/'+s.strokes.length;
    s.step=i;
    drawStroke(id,i,col,()=>{
      setTimeout(()=>playNext(i+1),150);
    });
  }
  playNext(s.step);
}


function mReset(id){
  const s=anim[id];if(!s)return;
  s.playing=false;s.step=0;
  const g=document.getElementById('mstrokes-'+id);
  if(g)g.innerHTML='';
  const sp=document.getElementById('msp-'+id);
  if(sp)sp.textContent='0/'+s.strokes.length;
  const btn=document.getElementById('mpb-'+id);
  if(btn){btn.textContent='▶ Play';btn.style.opacity='1';}
}

function togAnim(id,code,col){
  const s=anim[id];if(!s)return;
  const btn=document.getElementById('pb-'+id);
  if(s.playing){clearInterval(s.t);s.t=null;s.playing=false;btn.textContent='▶ Play';btn.style.background='';btn.style.color='#333';btn.style.borderColor='#ddd';}
  else{
    s.step=0;
    s.playing=true;btn.textContent='⏸ Pause';btn.style.background=col;btn.style.color='#fff';btn.style.borderColor=col;
    s.t=setInterval(()=>{
      const ab=document.getElementById('ab-'+id),sp=document.getElementById('sp-'+id);
      if(!ab){clearInterval(s.t);return;}
      if(s.step>=s.strokes.length){ab.innerHTML=mkSVG(s.strokes,-1,90,'#222','#222',s.char);sp.textContent=`${s.strokes.length}/${s.strokes.length}`;clearInterval(s.t);s.t=null;s.playing=false;btn.textContent='▶ Play';btn.style.background='';btn.style.color='#333';btn.style.borderColor='#ddd';return;}
      ab.innerHTML=mkSVG(s.strokes,s.step,90,col,'#ccc',s.char);sp.textContent=`${s.step+1}/${s.strokes.length}`;s.step++;
    },700);
  }
}
function rstAnim(id,col){
  const s=anim[id];if(!s)return;if(s.t){clearInterval(s.t);s.t=null;}
  s.step=0;s.playing=false;
  const ab=document.getElementById('ab-'+id),sp=document.getElementById('sp-'+id),btn=document.getElementById('pb-'+id);
  if(!ab)return;
  ab.innerHTML=mkSVG(s.strokes,-1,90,'#ddd','#ddd',s.char);sp.textContent=`${s.strokes.length}/${s.strokes.length} (tap Play)`;
  btn.textContent='▶ Play';btn.style.background='';btn.style.color='#333';btn.style.borderColor='#ddd';
}

function renderMix(){
  if(!MX.started){
    const pool=mixPool(),mx=Math.min(50,pool.length);
    if(MX.count>mx)MX.count=Math.max(5,mx);

      <div><div class="mix-label">Lessons:</div><div class="lesson-picks">`;

    h+=`</div></div>
      <div><div class="mix-label">Cards: <span id="mcL">${MX.count}</span> <span class="avail-note">/ ${pool.length} available</span></div>
        <div class="count-row"><input type="range" id="mcR" min="5" max="${mx}" step="5" value="${MX.count}" oninput="updMC(this.value)"><div class="count-num" id="mcN">${MX.count}</div></div></div>
      <button class="btn btn-dark" onclick="startMix()">Start Quiz →</button></div>`;
    document.getElementById('mainArea').innerHTML=h;return;
  }
  const act=MX.deck.filter(x=>!x.mastered),total=MX.deck.length,mc=MX.deck.filter(x=>x.mastered).length;
  const pct=total>0?Math.round(mc/total*100):0;
  let h=`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:#222;"></div></div><div class="prog-text">${act.length?MX.idx+1:0}/${act.length}</div><div class="got-badge" style="background:#f0f0f0;color:#333;">Got it: ${mc}/${total}</div></div>`;
  if(!act.length){
    const p2=Math.round(MX.got/total*100);
    const mxMissed=MX.deck.filter(x=>!x.mastered).map(x=>x.w);
    const mxMissedHTML=mxMissed.length>0?`
      <div style="width:100%;border-top:2px solid #eee;padding-top:14px;">
        <div style="font-size:12px;font-weight:900;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">Still learning (${mxMissed.length})</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${mxMissed.map(w=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;background:#fff7f5;border:1.5px solid #FF6B35;">
            <span style="font-family:'Noto Serif JP',serif;font-size:20px;color:#FF6B35;">${w.k}</span>
            <span style="font-size:13px;color:#555;">${w.r}</span>
            <span style="font-size:12px;color:#aaa;margin-left:auto;">${w.e}</span>
          </div>`).join('')}
        </div>
      </div>`:'';
    h+=`<div class="result-card"><div class="result-pct" style="color:#222;">${p2}%</div><div class="result-sub">${MX.got} out of ${total} correct</div><div class="result-row"><div class="rb"><div class="rb-n" style="color:#2ECC71;">${MX.got}</div><div class="rb-l">Got it</div></div><div class="rb"><div class="rb-n" style="color:#FF6B35;">${MX.again}</div><div class="rb-l">Still learning</div></div></div><div class="btn-row"><button class="btn" onclick="rstMix()">New quiz</button><button class="btn btn-dark" onclick="retryMix()">Retry same</button></div>${mxMissedHTML}</div>`;
  } else {
    if(MX.idx>=act.length)MX.idx=0;
    const en=act[MX.idx],w=en.w,l=en.l,col=HEX[l];
    h+=`<div class="card-area"><div class="card-wrap${MX.flipped?' flipped':''}" onclick="mFlip()"><div class="card-inner">
      <div class="card-face card-front" style="border-color:${col}33;position:relative;">
        <div style="position:absolute;top:14px;left:14px;font-size:11px;font-weight:900;padding:3px 10px;border-radius:99px;background:${col};color:#fff;">L${l}</div>
        ${w.red?`<div class="red-pip" style="background:${col};"></div>`:''}
        <div class="card-kanji" style="color:${col};">${w.k}</div>
        <div class="card-hint">Tap to flip</div>
      </div>
      <div class="card-face card-back" style="background:${col};border-color:${col};">
        <div class="card-reading" style="color:#fff;">${w.r}</div>
        <div class="card-meaning" style="color:rgba(255,255,255,.92);">${w.e}</div>
      </div>
    </div></div></div>`;
    if(!MX.flipped){h+=`<div class="btn-row"><button class="btn" onclick="mPrev()">← Prev</button><button class="btn btn-dark" onclick="mFlip()">Flip</button><button class="btn" onclick="mNext()">Next →</button></div>`;}
    else{h+=`<div class="btn-row"><button class="btn btn-again" onclick="mAgain()">✗ Still learning</button><button class="btn btn-got" onclick="mGot()">✓ Got it</button></div>`;}
  }
  document.getElementById('mainArea').innerHTML=h;
}
